services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      SPRING_R2DBC_URL: r2dbc:postgresql://postgres:5432/reactive_marketplace
      SPRING_R2DBC_USERNAME: marketplace
      SPRING_R2DBC_PASSWORD: marketplace
      SPRING_FLYWAY_URL: jdbc:postgresql://postgres:5432/reactive_marketplace
      SPRING_FLYWAY_USER: marketplace
      SPRING_FLYWAY_PASSWORD: marketplace
      JWT_SECRET: ${JWT_SECRET:-local-compose-jwt-secret-change-me-123456}
    ports:
      - "8080:8080"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: reactive_marketplace
      POSTGRES_USER: marketplace
      POSTGRES_PASSWORD: marketplace
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U marketplace -d reactive_marketplace" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
