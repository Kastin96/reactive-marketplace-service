services:
  postgres:
    image: postgres:16-alpine
    container_name: reactive-marketplace-postgres
    environment:
      POSTGRES_DB: reactive_marketplace
      POSTGRES_USER: marketplace
      POSTGRES_PASSWORD: marketplace
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U marketplace -d reactive_marketplace" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
