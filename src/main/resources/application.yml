spring:
  application:
    name: reactive-marketplace-service
  r2dbc:
    url: ${SPRING_R2DBC_URL:r2dbc:postgresql://localhost:5432/reactive_marketplace}
    username: ${SPRING_R2DBC_USERNAME:marketplace}
    password: ${SPRING_R2DBC_PASSWORD:marketplace}
  flyway:
    enabled: true
    url: ${SPRING_FLYWAY_URL:jdbc:postgresql://localhost:5432/reactive_marketplace}
    user: ${SPRING_FLYWAY_USER:marketplace}
    password: ${SPRING_FLYWAY_PASSWORD:marketplace}

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
  info:
    env:
      enabled: true

info:
  app:
    name: ${spring.application.name}
    description: Reactive marketplace backend service

app:
  security:
    jwt:
      issuer: ${JWT_ISSUER:reactive-marketplace-service}
      secret: ${JWT_SECRET:change-me-for-local-development-only}
      expiration: ${JWT_EXPIRATION:15m}

logging:
  level:
    com.example.marketplace: INFO
    org.springframework.security: WARN
    org.springframework.r2dbc: WARN
    org.flywaydb: INFO
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level ${spring.application.name} [%thread] %logger{36} - %msg%n%ex"
